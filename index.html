<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Mart - India's Best Online Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #f59e0b;
            --dark: #1e1b4b;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f1f5f9; overflow-x: hidden; }

        .navbar {
            background: linear-gradient(135deg, var(--dark) 0%, #312e81 100%);
            padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 28px; font-weight: 800; color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--secondary); }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.9); text-decoration: none; font-weight: 500; font-size: 15px; cursor: pointer; }
        .nav-links a:hover { color: var(--secondary); }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .cart-btn {
            background: var(--secondary); color: white; border: none; padding: 10px 20px;
            border-radius: 50px; cursor: pointer; font-weight: 600; display: flex; align-items: center;
            gap: 8px; position: relative;
        }
        .cart-count {
            position: absolute; top: -8px; right: -8px; background: var(--danger); color: white;
            width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: 700;
        }
        .admin-toggle {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-size: 13px;
        }

        .hero {
            margin-top: 70px;
            background: linear-gradient(135deg, var(--dark) 0%, #4338ca 50%, var(--primary) 100%);
            padding: 80px 20px; text-align: center; color: white;
        }
        .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 20px; }
        .hero h1 span { color: var(--secondary); }
        .hero p { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }

        .products-section { padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .product-img { width: 100%; height: 250px; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-name { font-size: 16px; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
        .product-price { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 15px; }
        .add-to-cart {
            width: 100%; background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px;
        }
        .add-to-cart:hover { background: var(--primary-dark); }

        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; display: none;
        }
        .cart-overlay.active { display: block; }
        .cart-sidebar {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: white; z-index: 2001; transition: right 0.4s;
        }
        .cart-sidebar.active { right: 0; }

        .footer { background: var(--dark); color: white; padding: 60px 20px 30px; margin-top: 60px; }
        .footer-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .footer-section p { color: rgba(255,255,255,0.7); line-height: 2; font-size: 14px; }

        .admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1f5f9; z-index: 4000; overflow-y: auto; }
        .admin-panel.active { display: block; }

        .staff-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1f5f9; z-index: 4000; overflow-y: auto; }
        .staff-panel.active { display: block; }

        .myorders-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1f5f9; z-index: 3500; overflow-y: auto; }
        .myorders-page.active { display: block; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--dark); color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: 600; z-index: 5000; opacity: 0; transition: all 0.4s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" onclick="showHome()">
                <i class="fas fa-shopping-bag"></i>
                Quick Mart
            </a>
            <div class="nav-links">
                <a onclick="showHome()">Home</a>
                <a onclick="scrollToProducts()">Products</a>
                <a onclick="showMyOrders()">My Orders</a>
                <a onclick="showStaff()">Staff</a>
            </div>
            <div class="nav-actions">
                <button class="admin-toggle" onclick="showAdmin()">
                    <i class="fas fa-lock"></i> Admin
                </button>
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    Cart
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Smart Shopping for <span>Everything</span> You Need</h1>
        <p>Discover amazing deals on electronics, fashion, beauty, accessories & more.</p>
    </section>

    <!-- Products -->
    <section class="products-section" id="products">
        <h2 style="text-align:center; margin-bottom:30px; color:var(--dark);">Featured Products</h2>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-section">
                <h3 style="color:var(--secondary); margin-bottom:20px;">Quick Mart</h3>
                <p><i class="fas fa-envelope"></i> quimkmart098@gmail.com</p>
                <p><i class="fas fa-phone"></i> +91 9817205542</p>
            </div>
        </div>
    </footer>

    <!-- Cart -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div style="padding:25px; border-bottom:1px solid #e2e8f0;">
            <h2>Your Cart</h2>
            <button onclick="toggleCart()" style="position:absolute; top:25px; right:25px; background:none; border:none; font-size:24px; cursor:pointer;">×</button>
        </div>
        <div id="cartItems" style="padding:20px;"></div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div style="max-width:1200px; margin:0 auto; padding:30px;">
            <h1>Admin Dashboard</h1>
            <button onclick="closeAdmin()" style="margin-bottom:20px;">Back to Store</button>
            <div id="adminContent"></div>
        </div>
    </div>

    <!-- Staff Panel -->
    <div class="staff-panel" id="staffPanel">
        <div style="max-width:400px; margin:100px auto; background:white; padding:40px; border-radius:20px; text-align:center;">
            <h2>Staff Login</h2>
            <input type="password" id="staffPasswordInput" placeholder="Enter staff password" style="width:100%; padding:15px; margin:15px 0; border:2px solid #e2e8f0; border-radius:12px;">
            <button onclick="loginStaff()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; cursor:pointer; font-weight:700;">Login</button>
            <button onclick="closeStaff()" style="width:100%; background:var(--gray); color:white; border:none; padding:15px; border-radius:12px; cursor:pointer; margin-top:15px;">Back</button>
        </div>
    </div>

    <!-- My Orders -->
    <div class="myorders-page" id="myordersPage">
        <div style="max-width:900px; margin:0 auto; padding:30px;">
            <h1>My Orders</h1>
            <button onclick="closeMyOrders()" style="margin-bottom:20px;">Back</button>
            <div id="myOrdersContent"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Added to cart!</div>

    <script>
        // Simple, working JavaScript
        let products = [
            { id: 1, name: "Wireless Bluetooth Earbuds Pro", price: 1299, oldPrice: 2499, image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400&h=400&fit=crop", stock: 45, category: "Electronics" },
            { id: 2, name: "Classic Denim Jacket", price: 1899, oldPrice: 3499, image: "https://images.unsplash.com/photo-1576871337622-98d48d1cf531?w=400&h=400&fit=crop", stock: 32, category: "Fashion" },
            { id: 3, name: "Vitamin C Face Serum", price: 499, oldPrice: 999, image: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400&h=400&fit=crop", stock: 78, category: "Beauty" },
            { id: 4, name: "Leather Bifold Wallet", price: 699, oldPrice: 1299, image: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=400&h=400&fit=crop", stock: 25, category: "Bags" },
            { id: 5, name: "Smart Fitness Band", price: 1599, oldPrice: 2999, image: "https://images.unsplash.com/photo-1575311373937-040b8e1fd5b6?w=400&h=400&fit=crop", stock: 56, category: "Fitness" },
            { id: 6, name: "Decorative Table Lamp", price: 1199, oldPrice: 2199, image: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&h=400&fit=crop", stock: 18, category: "Home" }
        ];

        let cart = [];
        let orders = [];
        let settings = { adminPassword: 'admin123', staffPassword: 'staff123' };

        function formatPrice(price) {
            return 'Rs.' + price.toLocaleString('en-IN');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function loadProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}" class="product-img" onerror="this.src='https://via.placeholder.com/400x400?text=${encodeURIComponent(p.name)}'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${formatPrice(p.price)}</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
            }

            updateCartCount();
            showToast('Added to cart!');
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function toggleCart() {
            document.getElementById('cartOverlay').classList.toggle('active');
            document.getElementById('cartSidebar').classList.toggle('active');
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--gray);">Your cart is empty</p>';
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            container.innerHTML = cart.map(item => `
                <div style="display:flex; gap:15px; padding:15px; background:#f8fafc; border-radius:15px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <div style="font-weight:600;">${item.name}</div>
                        <div style="color:var(--primary); font-weight:700;">${formatPrice(item.price * item.qty)}</div>
                        <div>Qty: ${item.qty}</div>
                    </div>
                </div>
            `).join('') + `
                <div style="border-top:2px solid #e2e8f0; padding-top:15px; margin-top:15px;">
                    <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:700;">
                        <span>Total</span>
                        <span>${formatPrice(total)}</span>
                    </div>
                    <button onclick="openCheckout()" style="width:100%; background:var(--secondary); color:white; border:none; padding:15px; border-radius:12px; cursor:pointer; font-weight:700; margin-top:15px;">Checkout</button>
                </div>
            `;
        }

        function openCheckout() {
            toggleCart();
            alert('Checkout functionality - enter your details');
        }

        function showAdmin() {
            const password = prompt('Enter admin password:');
            if (password === settings.adminPassword) {
                document.getElementById('adminPanel').classList.add('active');
                document.body.style.overflow = 'hidden';
                document.getElementById('adminContent').innerHTML = `
                    <h2>Dashboard</h2>
                    <p>Total Orders: ${orders.length}</p>
                    <p>Total Products: ${products.length}</p>
                `;
            } else if (password !== null) {
                showToast('Wrong password!');
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showStaff() {
            document.getElementById('staffPanel').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeStaff() {
            document.getElementById('staffPanel').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function loginStaff() {
            const password = document.getElementById('staffPasswordInput').value;
            if (password === settings.staffPassword) {
                showToast('Staff logged in!');
                closeStaff();
            } else {
                showToast('Wrong password!');
            }
        }

        function showMyOrders() {
            document.getElementById('myordersPage').classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('myOrdersContent').innerHTML = orders.length === 0 
                ? '<p>No orders yet</p>' 
                : orders.map(o => `<p>Order: ${o.id}</p>`).join('');
        }

        function closeMyOrders() {
            document.getElementById('myordersPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showHome() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function scrollToProducts() {
            document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
